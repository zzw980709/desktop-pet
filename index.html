<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: transparent;
        overflow: visible;
        user-select: none;
      }
      canvas {
        display: block;
        position: absolute;
        top: 0; left: 0;
        width: 64px; height: 64px;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
        outline: none;
        box-shadow: none;
        -webkit-tap-highlight-color: transparent;
      }
      #pet-import-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
      }
      #pet-import-overlay.show {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .pet-import-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.45);
      }
      .pet-import-dialog {
        position: relative;
        width: 300px;
        padding: 20px;
        border-radius: 18px;
        border: 1px solid rgba(255,255,255,0.12);
        background: linear-gradient(180deg, rgba(22,26,37,0.98), rgba(12,14,20,0.98));
        box-shadow: 0 18px 40px rgba(0,0,0,0.5);
        color: #f3f7ff;
        font-family: "SF Pro Text", "Helvetica Neue", sans-serif;
        font-size: 13px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .pet-import-title {
        font-size: 16px;
        font-weight: 700;
        color: #f7f9ff;
      }
      .pet-import-file-info {
        font-size: 11px;
        color: rgba(157,173,204,0.82);
        word-break: break-all;
      }
      .pet-import-file-info.ok { color: #4ade80; }
      .pet-import-file-info.err { color: #f87171; }
      .pet-import-pick-btn {
        width: 100%;
        min-height: 36px;
        border: 1px solid rgba(115,166,255,0.3);
        border-radius: 10px;
        background: rgba(99,168,255,0.12);
        color: #9cc4ff;
        font-size: 13px;
        cursor: pointer;
        transition: background 140ms ease;
      }
      .pet-import-pick-btn:hover {
        background: rgba(99,168,255,0.22);
      }
      .pet-import-input {
        width: 100%;
        min-height: 36px;
        padding: 8px 10px;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 10px;
        background: rgba(255,255,255,0.04);
        color: #f3f7ff;
        font-size: 13px;
        outline: none;
      }
      .pet-import-input:focus {
        border-color: rgba(115,166,255,0.4);
      }
      .pet-import-input::placeholder {
        color: rgba(160,184,220,0.4);
      }
      .pet-import-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .pet-import-btn {
        min-height: 32px;
        padding: 6px 18px;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        background: rgba(255,255,255,0.04);
        color: #c3cee4;
        font-size: 12px;
        cursor: pointer;
      }
      .pet-import-btn:hover { background: rgba(255,255,255,0.08); }
      .pet-import-btn.primary {
        border-color: rgba(99,168,255,0.3);
        background: rgba(99,168,255,0.15);
        color: #9cc4ff;
      }
      .pet-import-btn.primary:hover { background: rgba(99,168,255,0.25); }
      .pet-import-btn:disabled {
        opacity: 0.4;
        cursor: default;
      }
    </style>
    <title>Desktop Pet</title>
  </head>
  <body>
    <canvas id="pet-canvas"></canvas>
    <div id="pet-import-overlay">
      <div class="pet-import-backdrop"></div>
      <div class="pet-import-dialog">
        <div class="pet-import-title">添加新宠物</div>
        <button class="pet-import-pick-btn" id="pet-import-pick-btn">选择精灵图...</button>
        <div class="pet-import-file-info" id="pet-import-file-info"></div>
        <input class="pet-import-input" id="pet-import-name-input" placeholder="输入宠物名称" maxlength="30" />
        <div class="pet-import-actions">
          <button class="pet-import-btn" id="pet-import-cancel-btn">取消</button>
          <button class="pet-import-btn primary" id="pet-import-confirm-btn" disabled>确认添加</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
