<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: rgba(22,26,37,0.98);
        overflow: hidden;
        user-select: none;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }
      .dialog {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 20px;
        color: #f3f7ff;
        font-size: 13px;
      }
      .title { font-size: 16px; font-weight: 700; color: #f7f9ff; }
      .file-info {
        font-size: 11px;
        color: rgba(157,173,204,0.82);
        word-break: break-all;
      }
      .file-info.ok { color: #4ade80; }
      .file-info.err { color: #f87171; }
      .pick-btn {
        width: 100%;
        min-height: 36px;
        border: 1px solid rgba(115,166,255,0.3);
        border-radius: 10px;
        background: rgba(99,168,255,0.12);
        color: #9cc4ff;
        font-size: 13px;
        cursor: pointer;
        transition: background 140ms ease;
      }
      .pick-btn:hover { background: rgba(99,168,255,0.22); }
      input {
        width: 100%;
        min-height: 36px;
        padding: 8px 10px;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 10px;
        background: rgba(255,255,255,0.04);
        color: #f3f7ff;
        font-size: 13px;
        outline: none;
        font-family: inherit;
      }
      input:focus { border-color: rgba(115,166,255,0.4); }
      input::placeholder { color: rgba(160,184,220,0.4); }
      .actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      button {
        min-height: 32px;
        padding: 6px 18px;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        background: rgba(255,255,255,0.04);
        color: #c3cee4;
        font-size: 12px;
        cursor: pointer;
        font-family: inherit;
      }
      button:hover { background: rgba(255,255,255,0.08); }
      button.primary {
        border-color: rgba(99,168,255,0.3);
        background: rgba(99,168,255,0.15);
        color: #9cc4ff;
      }
      button.primary:hover { background: rgba(99,168,255,0.25); }
      button:disabled { opacity: 0.4; cursor: default; }
    </style>
    <title>添加宠物</title>
  </head>
  <body>
    <div class="dialog">
      <div class="title">添加新宠物</div>
      <button class="pick-btn" id="pick-btn">选择精灵图...</button>
      <div class="file-info" id="file-info"></div>
      <input id="name-input" placeholder="输入宠物名称" maxlength="30" />
      <div class="actions">
        <button id="cancel-btn">取消</button>
        <button id="confirm-btn" class="primary" disabled>确认添加</button>
      </div>
    </div>
    <script type="module" src="/src/pet-import-main.ts"></script>
  </body>
</html>
